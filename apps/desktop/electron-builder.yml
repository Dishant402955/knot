# https://www.electron.build/configuration/configuration
# Rebuild after code changes: bump version (if shipping), then `pnpm package:win` / `:mac` / `:linux`.
# Env is baked at `electron-vite build --mode production` — set Clerk + KNOT_WEB_APP_URL in .env.production.

appId: app.knot.desktop
productName: Knot
copyright: Copyright © Knot

directories:
  buildResources: packaging
  output: release

files:
  - out/**/*
  - package.json
  - "!src/**"
  - "!scripts/**"
  - "!**/.env"
  - "!**/.env.*"
  - "!electron.vite.config.ts"
  - "!tsconfig*.json"
  - "!example.env"
  - "!example.env.production"
  - "!README.md"

asar: true

protocols:
  - name: Knot
    schemes:
      - knot

win:
  executableName: Knot
  icon: icon.png
  target:
    - target: nsis
      arch:
        - x64
  # Code signing (optional): set CSC_LINK (pfx/p12 path or base64) + CSC_KEY_PASSWORD

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: always
  createStartMenuShortcut: true
  shortcutName: Knot
  uninstallDisplayName: Knot
  artifactName: Knot-${version}-Setup.${ext}
  deleteAppDataOnUninstall: false

mac:
  category: public.app-category.productivity
  icon: icon.png
  target:
    - target: dmg
      arch:
        - x64
        - arm64
  hardenedRuntime: true
  gatekeeperAssess: false
  entitlements: entitlements.mac.plist
  entitlementsInherit: entitlements.mac.plist
  extendInfo:
    NSCameraUsageDescription: Knot needs camera access for the webcam overlay while recording.
    NSMicrophoneUsageDescription: Knot needs microphone access to record your voice.
    NSScreenCaptureDescription: Knot needs screen recording permission to capture your display.
  # Notarization: packaging/notarize.cjs (APPLE_ID, APPLE_APP_SPECIFIC_PASSWORD, APPLE_TEAM_ID)

afterSign: packaging/notarize.cjs

dmg:
  artifactName: Knot-${version}.${ext}

linux:
  category: Utility
  icon: icon.png
  target:
    - AppImage
  artifactName: Knot-${version}.${ext}

# Auto-update feed (electron-updater). Publish artifacts with GH_TOKEN / GH_RELEASE.
publish:
  provider: github
  owner: Dishant402955
  repo: knot
  releaseType: release

npmRebuild: false
